<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🩺 SafeDrip Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>

<h1>🩺 SafeDrip Pro</h1>

<p>Intelligent IV Monitoring System</p>

</header>

<div class="card">

<h2>👤 Patient Details</h2>

<table>

<tr>
<td><b>Patient</b></td>
<td id="patientName">Rahul Kumar</td>
</tr>

<tr>
<td><b>Bed</b></td>
<td id="bedNumber">ICU-05</td>
</tr>

<tr>
<td><b>Ward</b></td>
<td id="ward">ICU</td>
</tr>

<tr>
<td><b>Doctor</b></td>
<td id="doctor">Dr. Reddy</td>
</tr>

</table>

</div>

<div class="grid">

<div class="card">

<h2>💧 Saline ID</h2>

<div class="big" id="txid">

SYS_01

</div>

</div>

<div class="card">

<h2>⚖ Weight</h2>

<div class="big" id="weight">

0.00 g

</div>

</div>

<div class="card">

<h2>⚙ Relay</h2>

<div class="big" id="relay">

OFF

</div>

</div>

<div class="card">

<h2>🟢 Status</h2>

<div class="big" id="status">

SAFE

</div>

</div>

</div>

<div class="grid">

<div class="card">

<h2>⚙ Motor Control</h2>

<div class="big" id="motor">

AUTO

</div>

<button onclick="sendMotor('ON')">ON</button>

<button onclick="sendMotor('OFF')">OFF</button>

<button onclick="sendMotor('AUTO')">AUTO</button>

</div>

<div class="card">

<h2>🔔 Buzzer Control</h2>

<div class="big" id="buzzer">

AUTO

</div>

<button onclick="sendBuzzer('ON')">ON</button>

<button onclick="sendBuzzer('OFF')">OFF</button>

<button onclick="sendBuzzer('AUTO')">AUTO</button>

</div>

</div>

<div class="card">

<h2>🕒 Last Updated</h2>

<div class="big" id="time">

--

</
