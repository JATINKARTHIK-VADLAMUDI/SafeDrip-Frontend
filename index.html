<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SafeDrip ICU Monitoring</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<div class="header">

<h1>🩺 SafeDrip ICU Monitoring System</h1>

<p>Real-Time Saline Monitoring</p>

</div>

<!-- Patient Information -->

<div class="card">

<h2>Patient Details</h2>

<table>

<tr>
<td><b>Bed Number</b></td>
<td id="bedNumber">ICU-03</td>
</tr>

<tr>
<td><b>Ward</b></td>
<td id="ward">ICU</td>
</tr>

</table>

</div>

<!-- Transmitter -->

<div class="card">

<h2>Transmitter ID</h2>

<div class="bigValue" id="txid">

SYS_01

</div>

</div>

<!-- Weight -->

<div class="card">

<h2>Saline Weight</h2>

<div class="bigValue" id="weight">

0.00 g

</div>

</div>

<!-- Relay -->

<div class="card">

<h2>Relay Status</h2>

<div class="bigValue" id="relay">

OFF

</div>

</div>

<!-- Status -->

<div class="card">

<h2>System Status</h2>

<div class="bigValue" id="status">

SAFE

</div>

</div>

<!-- Motor -->

<div class="card">

<h2>Motor Control</h2>

<div class="bigValue" id="motor">

AUTO

</div>

<button onclick="sendMotor('ON')">ON</button>

<button onclick="sendMotor('OFF')">OFF</button>

<button onclick="sendMotor('AUTO')">AUTO</button>

</div>

<!-- Buzzer -->

<div class="card">

<h2>Buzzer Control</h2>

<div class="bigValue" id="buzzer">

AUTO

</div>

<button onclick="sendBuzzer('ON')">ON</button>

<button onclick="sendBuzzer('OFF')">OFF</button>

<button onclick="sendBuzzer('AUTO')">AUTO</button>

</div>

<!-- Last Updated -->

<div class="card">

<h2>Last Updated</h2>

<div class="bigValue" id="time">

--

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
