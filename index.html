<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SafeDrip ICU Monitoring</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🩺 SafeDrip ICU Monitoring</h1>

<div class="card">

<h2>Transmitter ID</h2>

<h3 id="txid">SYS_01</h3>

</div>

<div class="card">

<h2>Saline Weight</h2>

<h3 id="weight">0 g</h3>

</div>

<div class="card">

<h2>Relay Status</h2>

<h3 id="relay">OFF</h3>

</div>

<div class="card">

<h2>Status</h2>

<h3 id="status">SAFE</h3>

</div>

<div class="card">

<h2>Control Mode</h2>

<h3 id="mode">AUTO</h3>

<button onclick="sendCommand('ON')">
ON
</button>

<button onclick="sendCommand('OFF')">
OFF
</button>

<button onclick="sendCommand('AUTO')">
AUTO
</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
